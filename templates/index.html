<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SofaScore Basket Analiz</title>
    <style>
        :root {
            --bg: #0f1419;
            --panel: #161d26;
            --panel-2: #1f2833;
            --border: #2a3442;
            --text: #e6edf3;
            --muted: #8b98a5;
            --accent: #4ea8de;
            --over: #f59f00;
            --under: #5ecb84;
            --pass: #b0b8c1;
            --danger: #ef5350;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
        }
        header {
            position: sticky; top: 0; z-index: 10;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            display: flex; align-items: center; gap: 12px;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 16px; margin: 0;
            flex: 1 1 auto;
            letter-spacing: 0.2px;
        }
        header .meta {
            font-size: 12px; color: var(--muted);
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        header button {
            background: var(--accent); color: #001018;
            border: none; border-radius: 6px;
            padding: 8px 12px; font-weight: 600;
            cursor: pointer;
        }
        header button:hover { filter: brightness(1.08); }
        header button:disabled { opacity: 0.6; cursor: wait; }

        main {
            display: grid;
            grid-template-columns: minmax(280px, 380px) 1fr;
            gap: 14px;
            padding: 14px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 860px) {
            main { grid-template-columns: 1fr; }
            #detail-panel.hidden-mobile { display: none; }
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .panel-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-2);
            font-weight: 600;
            font-size: 13px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .panel-body { padding: 10px 12px; }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }
        .filters input {
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px; border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }

        .match-list { max-height: 75vh; overflow-y: auto; }
        .match-card {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 120ms;
        }
        .match-card:hover { background: var(--panel-2); }
        .match-card.active { background: rgba(78,168,222,0.12); border-left: 3px solid var(--accent); padding-left: 9px; }
        .match-card .teams { display: flex; justify-content: space-between; font-weight: 600; }
        .match-card .teams .score { color: var(--accent); }
        .match-card .sub { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; justify-content: space-between; gap: 8px; }
        .match-card .periods { color: var(--muted); font-size: 11px; margin-top: 4px; font-variant-numeric: tabular-nums; }

        #detail-panel .empty {
            color: var(--muted);
            padding: 30px 20px; text-align: center;
            font-size: 14px;
        }

        .score-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-bottom: 1px solid var(--border);
            background: var(--panel-2);
        }
        .score-row .big {
            font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums;
            color: var(--accent);
        }
        .score-row .teams-big {
            flex: 1;
            display: flex; flex-direction: column; gap: 2px;
        }
        .score-row .tournament { font-size: 12px; color: var(--muted); }

        .decision-banner {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px;
        }
        .decision-banner .side {
            font-size: 20px; font-weight: 700;
        }
        .decision-banner .side.over { color: var(--over); }
        .decision-banner .side.under { color: var(--under); }
        .decision-banner .side.pass { color: var(--pass); }
        .decision-banner .side.mixed { color: var(--pass); }
        .decision-banner .side.nodata { color: var(--muted); }
        .decision-banner .side.danger { color: var(--danger); }

        .anomaly-badge {
            margin: 0 16px 8px;
            padding: 7px 12px;
            background: rgba(245,159,0,0.10);
            border: 1px solid rgba(245,159,0,0.40);
            border-radius: 6px;
            font-size: 12px;
            color: var(--over);
        }
        .trap-badge {
            margin: 0 16px 8px;
            padding: 7px 12px;
            background: rgba(239,83,80,0.10);
            border: 1px solid rgba(239,83,80,0.40);
            border-radius: 6px;
            font-size: 12px;
            color: var(--danger);
            font-weight: 600;
        }
        .decision-banner .confidence-bar {
            height: 6px; border-radius: 3px;
            background: var(--panel-2); overflow: hidden;
        }
        .decision-banner .confidence-bar > span {
            display: block; height: 100%;
            background: linear-gradient(90deg, var(--danger), var(--over), var(--under));
        }
        .decision-banner .confidence-label { font-size: 12px; color: var(--muted); }

        .reasons {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }
        .reasons h4 { margin: 0 0 6px 0; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .reasons ul { margin: 0; padding-left: 18px; }
        .reasons li { margin: 3px 0; }
        .reasons.warnings li { color: var(--over); }

        .line-input {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }
        .line-input label { font-size: 13px; color: var(--muted); }
        .line-input input {
            background: var(--panel-2); border: 1px solid var(--border);
            color: var(--text); padding: 8px 10px; border-radius: 6px;
            font-size: 14px; width: 100px;
        }
        .line-input button {
            background: var(--accent); color: #001018; border: none;
            padding: 8px 12px; border-radius: 6px; font-weight: 600;
            cursor: pointer;
        }
        .line-input .value-hint { font-size: 12px; color: var(--muted); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
            padding: 12px 16px;
        }
        .mini-card {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .mini-card .h {
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.6px;
            margin-bottom: 4px;
        }
        .mini-card .v { font-size: 15px; font-weight: 600; }
        .mini-card .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

        .stat-table {
            width: 100%; border-collapse: collapse;
            font-variant-numeric: tabular-nums;
            font-size: 13px;
        }
        .stat-table th, .stat-table td { padding: 6px 8px; text-align: center; }
        .stat-table th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
        .stat-table td.label { text-align: left; color: var(--muted); font-size: 12px; }
        .stat-table tr { border-bottom: 1px solid var(--border); }
        .stat-table .section-h { background: var(--panel-2); font-weight: 600; color: var(--text); font-size: 12px; }

        .section-title {
            margin: 0; padding: 10px 16px 4px;
            font-size: 12px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        .back-btn {
            display: none;
            margin-right: 8px;
            background: var(--panel-2); color: var(--text);
            border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px;
            cursor: pointer;
        }
        @media (max-width: 860px) {
            .back-btn.visible { display: inline-block; }
        }
        .copy-btn {
            background: var(--panel-2); color: var(--muted);
            border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px;
            cursor: pointer; font-size: 12px; font-weight: 500;
            transition: color 120ms, border-color 120ms;
        }
        .copy-btn:hover { color: var(--text); border-color: var(--accent); }
        .copy-btn.copied { color: var(--under); border-color: var(--under); }

        .player-notes {
            padding: 10px 16px;
        }
        .player-notes .note {
            font-size: 13px; padding: 4px 0;
            color: var(--muted);
        }
        .player-notes .note.danger { color: var(--danger); }

        .key-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-bottom: 1px solid var(--border);
        }
        @media (max-width: 600px) {
            .key-metrics { grid-template-columns: 1fr 1fr; }
        }
        .key-card {
            padding: 14px 18px;
            border-right: 1px solid var(--border);
            background: var(--panel-2);
        }
        .key-card:last-child { border-right: none; }
        .key-card .kh {
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .key-card .kv {
            font-size: 30px; font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            line-height: 1.1;
        }
        .key-card .kv .unit {
            font-size: 14px; font-weight: 400; color: var(--muted);
        }
        .key-card .ksub {
            font-size: 12px; color: var(--muted);
            margin-top: 5px;
        }

        .loading {
            text-align: center; padding: 20px; color: var(--muted);
        }
        .err {
            background: rgba(239, 83, 80, 0.1);
            color: var(--danger);
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .auto-refresh {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--muted);
        }
        .auto-refresh input { accent-color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <h1>🏀 SofaScore Basket Analiz</h1>
        <div class="meta">
            <span id="live-count">— canlı</span>
            <span id="last-refresh">—</span>
        </div>
        <label class="auto-refresh">
            <input type="checkbox" id="auto-refresh" />
            Otomatik yenile (30s)
        </label>
        <button id="refresh-btn">Yenile</button>
    </header>

    <main>
        <section class="panel" id="list-panel">
            <div class="panel-header">
                Canlı maçlar
                <span class="meta" id="list-count" style="font-weight:400; color: var(--muted);">—</span>
            </div>
            <div class="filters">
                <input id="filter-team" type="text" placeholder="Takım ara..." />
                <input id="filter-league" type="text" placeholder="Lig ara..." />
            </div>
            <div class="match-list" id="match-list">
                <div class="loading">Yükleniyor...</div>
            </div>
        </section>

        <section class="panel" id="detail-panel">
            <div class="panel-header">
                <span>
                    <button class="back-btn" id="back-btn">← Geri</button>
                    Maç analizi
                </span>
                <span style="display:flex; align-items:center; gap:10px;">
                    <span class="meta" id="detail-meta" style="font-weight:400; color: var(--muted);"></span>
                    <button class="copy-btn" id="copy-json-btn" title="Analizi JSON olarak kopyala (Gemini için)" style="display:none;">⎘ JSON Kopyala</button>
                </span>
            </div>
            <div id="detail-body">
                <div class="empty">Sol taraftan bir maç seç.</div>
            </div>
        </section>
    </main>

    <script>
    const api = {
        live: () => fetch('/api/live-events').then(r => r.json()),
        analysis: (id, line) => {
            const q = line ? ('?line=' + encodeURIComponent(line)) : '';
            return fetch(`/api/event/${id}/analysis${q}`).then(r => r.json());
        },
    };

    const state = {
        events: [],
        selectedId: null,
        filterTeam: '',
        filterLeague: '',
        liveLine: null,
        lastAnalysis: null,
        autoRefreshTimer: null,
    };

    const $ = (id) => document.getElementById(id);

    function fmtTime() {
        const d = new Date();
        return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function statusText(ev) {
        const s = ev.status_description || '';
        return s;
    }

    function renderList() {
        const list = $('match-list');
        const term = state.filterTeam.trim().toLowerCase();
        const leagueTerm = state.filterLeague.trim().toLowerCase();

        const filtered = state.events.filter(e => {
            const teamHit = !term ||
                (e.home?.name || '').toLowerCase().includes(term) ||
                (e.away?.name || '').toLowerCase().includes(term);
            const leagueHit = !leagueTerm ||
                (e.tournament || '').toLowerCase().includes(leagueTerm) ||
                (e.category || '').toLowerCase().includes(leagueTerm);
            return teamHit && leagueHit;
        });

        $('list-count').textContent = `${filtered.length} / ${state.events.length}`;

        if (!state.events.length) {
            list.innerHTML = '<div class="loading">Canlı basket maçı yok.</div>';
            return;
        }
        if (!filtered.length) {
            list.innerHTML = '<div class="loading">Filtreyle eşleşen maç yok.</div>';
            return;
        }

        list.innerHTML = filtered.map(e => {
            const hs = e.home_score ?? '-';
            const as = e.away_score ?? '-';
            const active = state.selectedId === e.id ? 'active' : '';
            const periods = (e.period_scores || []).map(p =>
                `Q${p.period}: ${p.home ?? '-'}-${p.away ?? '-'}`
            ).join(' · ');
            return `
              <div class="match-card ${active}" data-id="${e.id}">
                <div class="teams">
                  <span>${escapeHtml(e.home?.name || '-')} <span class="score">${hs}</span></span>
                  <span><span class="score">${as}</span> ${escapeHtml(e.away?.name || '-')}</span>
                </div>
                <div class="sub">
                  <span>${escapeHtml(e.tournament || '-')}</span>
                  <span>${escapeHtml(statusText(e))}</span>
                </div>
                ${periods ? `<div class="periods">${periods}</div>` : ''}
              </div>
            `;
        }).join('');

        list.querySelectorAll('.match-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = Number(card.dataset.id);
                selectEvent(id);
            });
        });
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    async function loadLive() {
        $('refresh-btn').disabled = true;
        try {
            const data = await api.live();
            state.events = data.events || [];
            $('live-count').textContent = `${state.events.length} canlı`;
            $('last-refresh').textContent = 'Son: ' + fmtTime();
            renderList();
        } catch (e) {
            $('match-list').innerHTML = '<div class="err">Liste alınamadı.</div>';
        } finally {
            $('refresh-btn').disabled = false;
        }
    }

    async function selectEvent(id, keepLine = false) {
        if (!keepLine && state.selectedId !== id) {
            state.liveLine = null;
        }
        state.selectedId = id;
        renderList();
        $('detail-panel').classList.remove('hidden-mobile');
        $('back-btn').classList.add('visible');
        $('copy-json-btn').style.display = 'none';
        $('detail-body').innerHTML = '<div class="loading">Analiz hazırlanıyor...</div>';

        try {
            const data = await api.analysis(id, state.liveLine);
            state.lastAnalysis = data;
            renderDetail(data);
        } catch (e) {
            $('detail-body').innerHTML = '<div class="err">Analiz alınamadı.</div>';
        }
    }

    function sideClass(side) {
        if (!side) return 'nodata';
        if (side.startsWith('ÜST')) return 'over';
        if (side.startsWith('ALT')) return 'under';
        if (side.includes('TUZAK') || side.includes('UZAK')) return 'danger';
        if (side.startsWith('Karışık')) return 'mixed';
        if (side === 'Pas') return 'pass';
        return 'nodata';
    }

    function buildGeminiJson(data) {
        const { event: ev, analysis: a } = data;
        const adv = a.advanced || {};
        const s = a.stats || {};

        function statPair(key) {
            const r = s[key];
            return r ? { ev: r.home, dep: r.away } : undefined;
        }
        function maPair(mKey, aKey) {
            const m = s[mKey], at = s[aKey];
            if (!m || !at) return undefined;
            return {
                ev: `${m.home ?? '-'}/${at.home ?? '-'}`,
                dep: `${m.away ?? '-'}/${at.away ?? '-'}`,
            };
        }

        return {
            mac: {
                ev_takim: ev?.home?.name,
                dep_takim: ev?.away?.name,
                skor: `${ev?.home_score ?? '-'} - ${ev?.away_score ?? '-'}`,
                toplam_skor: a.current_total,
                turnuva: ev?.tournament,
                durum: ev?.status_description,
                periyot_skorlari: (ev?.period_scores || []).map(p => ({
                    periyot: p.period,
                    ev: p.home,
                    dep: p.away,
                })),
            },
            sure: {
                gecen_dk: a.elapsed_minutes,
                kalan_dk: a.remaining_minutes,
                toplam_dk: a.total_minutes,
                mevcut_periyot: a.current_period,
                uzatma: a.in_overtime,
            },
            lig: {
                tip: a.league_type,
                stil: a.league_style_label,
                baseline_ppm: a.baseline_ppm,
                baseline_ortg: a.baseline_ortg,
                beklenen_toplam: a.league_expected_total,
            },
            projeksiyon: {
                ham_projeksiyon: a.raw_projected_total,
                sigma: a.sigma,
                mevcut_ppm: a.current_ppm,
                pace_index: a.pace_index,
                pace_etiketi: a.pace_label,
            },
            dna_motor: {
                fair_value: a.fair_value,
                base_total: a.base_total,
                regresyon_agirligi: a.regression_weight,
                anomali: a.anomaly,
                tuzak: a.trap,
                hedef_ppm: a.target_ppm,
            },
            karar: {
                tavsiye: a.recommendation_side,
                guven_skoru: a.confidence_score,
                guven_etiketi: a.confidence_label,
                z_skoru: a.z_score,
                nedenler: a.reasons,
                uyarilar: a.warnings,
                barem: data.live_line ?? null,
                barem_vs_proj: a.value_vs_line ?? null,
            },
            ileri_metrikler: {
                possessions: adv.possessions,
                ortg: adv.ortg,
                efg_pct: adv.efg_pct,
                ts_pct: adv.ts_pct,
                ftr: adv.ftr,
                orb_pct: adv.orb_pct,
                tov_pct: adv.tov_pct,
                verim_endeksi: a.efficiency_index,
            },
            etiketler: {
                sut_kalitesi: a.shot_quality_label,
                faul_ft_baskisi: a.foul_pressure_label,
                top_kaybi: a.turnover_label,
                ribaund: a.rebound_label,
                mac_scripti: a.script_label,
            },
            istatistikler: {
                saha_ici: maPair('fg_made', 'fg_att'),
                iki_sayi: maPair('two_made', 'two_att'),
                uc_sayi: maPair('three_made', 'three_att'),
                serbest_atis: maPair('ft_made', 'ft_att'),
                toplam_ribaund: statPair('rebounds_total'),
                hucum_ribaund: statPair('offensive_rebounds'),
                savunma_ribaund: statPair('defensive_rebounds'),
                asist: statPair('assists'),
                top_kaybi: statPair('turnovers'),
                top_calma: statPair('steals'),
                blok: statPair('blocks'),
                faul: statPair('fouls'),
            },
            oyuncu_notlari: a.player_notes || [],
        };
    }

    function renderDetail(data) {
        const { event: ev, analysis: a } = data;
        if (!ev || !a) {
            $('detail-body').innerHTML = '<div class="err">Maç verisi yok.</div>';
            return;
        }

        const styleSuffix = a.league_style_label ? ` · ${a.league_style_label}` : '';
        const baselineSuffix = a.baseline_ppm ? ` · ort. ${a.baseline_ppm} sayı/dk` : '';
        $('detail-meta').textContent = a.league_type
            ? `${a.league_type} · ${a.total_minutes} dk${styleSuffix}${baselineSuffix}`
            : '';
        $('detail-meta').title = a.league_source || '';

        const hs = ev.home_score ?? '-';
        const as = ev.away_score ?? '-';
        const periods = (ev.period_scores || []).map(p =>
            `Q${p.period} ${p.home ?? '-'}-${p.away ?? '-'}`
        ).join('  ·  ');

        const elapsed = a.elapsed_minutes !== null ? a.elapsed_minutes.toFixed(1) : '—';
        const remaining = a.remaining_minutes !== null ? a.remaining_minutes.toFixed(1) : '—';
        const projected = a.projected_total ?? '—';
        const rawPace = a.raw_pace ?? '—';

        const sigmaHtml = a.sigma
            ? `<span class="unit"> ±${a.sigma}</span>`
            : '';

        const fairValue   = a.fair_value  != null ? a.fair_value  : '—';
        const targetPpm   = a.target_ppm  != null ? a.target_ppm  : '—';
        const empVal      = a.emp         != null ? a.emp.toFixed(1) : '—';
        const rawProj     = a.raw_projected_total != null ? a.raw_projected_total : (projected !== '—' ? projected : '—');
        const baseTotal   = a.base_total  != null ? a.base_total  : '—';
        const regWeight   = a.regression_weight != null
            ? (a.regression_weight * 100).toFixed(0) + '%' : '—';
        const currentPpm  = a.current_ppm != null ? a.current_ppm : (rawPace !== '—' ? rawPace : '—');

        const periodLen   = a.period_length || 10;
        const periodCount = a.period_count  || 4;
        const periodScores = ev.period_scores || [];
        const quarterPpmHtml = (() => {
            if (!periodScores.length) return '';
            const items = periodScores.map(p => {
                const total = (p.home ?? 0) + (p.away ?? 0);
                const isOt  = p.period > periodCount;
                const dur   = isOt ? 5 : periodLen;
                const ppm   = dur > 0 ? (total / dur).toFixed(2) : '—';
                const label = isOt ? `OT${p.period - periodCount}` : `Q${p.period}`;
                return `<span style="white-space:nowrap"><span style="color:var(--muted);font-size:10px;">${label}</span> <strong>${ppm}</strong></span>`;
            });
            return `<div style="margin-top:6px; display:flex; flex-wrap:wrap; gap:8px; font-size:12px;">${items.join('')}</div>`;
        })();

        const anomalyHtml = a.anomaly
            ? `<div class="anomaly-badge">⚠ ${escapeHtml(a.anomaly)}</div>` : '';

        const trapDiffVal = (a.fair_value != null && data.live_line != null)
            ? (a.fair_value - data.live_line) : null;
        const trapSign    = trapDiffVal != null ? (trapDiffVal >= 0 ? '+' : '') + trapDiffVal.toFixed(1) : '?';
        const trapHtml    = a.trap
            ? `<div class="trap-badge">🔴 TUZAK: Fair Value ${fairValue} — Barem ${data.live_line ?? '?'} = ${trapSign} puan fark</div>` : '';

        const keyMetricsHtml = `
          ${anomalyHtml}${trapHtml}
          <div class="key-metrics">
            <div class="key-card">
              <div class="kh">Ham Projeksiyon</div>
              <div class="kv">${rawProj}${sigmaHtml}</div>
              <div class="ksub">Mevcut: ${a.current_total ?? '—'} &nbsp;·&nbsp; EMP: ${empVal} dk &nbsp;·&nbsp; Lig bekl: ${a.league_expected_total ?? '—'}</div>
            </div>
            <div class="key-card" style="border-left:2px solid rgba(94,203,132,0.5); border-right:2px solid rgba(94,203,132,0.5); background:rgba(94,203,132,0.06);">
              <div class="kh">Fair Value (DNA)</div>
              <div class="kv" style="color:var(--under);">${fairValue}</div>
              <div class="ksub">Base: ${baseTotal} &nbsp;·&nbsp; Regresyon: ${regWeight}</div>
            </div>
            <div class="key-card">
              <div class="kh">PPM &nbsp;/&nbsp; Hedef PPM</div>
              <div class="kv">${currentPpm}<span class="unit"> sayı/dk</span></div>
              <div class="ksub">Lig: ${a.baseline_ppm ?? '—'} &nbsp;·&nbsp; Hedef: ${targetPpm} &nbsp;·&nbsp; ${escapeHtml(a.pace_label || '—')}</div>
              ${quarterPpmHtml}
            </div>
          </div>
        `;

        const vl = a.value_vs_line;
        const vlHtml = vl ? `
          <div class="mini-card">
            <div class="h">Barem vs Projeksiyon</div>
            <div class="v">${vl.diff > 0 ? '+' : ''}${vl.diff} (z=${vl.z})</div>
            <div class="sub">${escapeHtml(vl.label)}</div>
          </div>
        ` : '';

        const adv = a.advanced || {};
        const fmtPct = (x) => x == null ? '—' : (x*100).toFixed(1) + '%';
        const fmtNum = (x) => x == null ? '—' : x;
        const advHtml = `
          <div class="mini-card">
            <div class="h">Verim (ORtg)</div>
            <div class="v">${fmtNum(adv.ortg)}</div>
            <div class="sub">Lig ort. ${a.baseline_ortg ?? '—'} · idx ${a.efficiency_index ?? '—'}</div>
          </div>
          <div class="mini-card">
            <div class="h">Possessions</div>
            <div class="v">${fmtNum(adv.possessions)}</div>
            <div class="sub">TS%: ${fmtPct(adv.ts_pct)} · eFG%: ${fmtPct(adv.efg_pct)}</div>
          </div>
        `;

        const reasonsHtml = (a.reasons || []).length
            ? `<ul>${a.reasons.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>`
            : '<em>Henüz net neden yok.</em>';

        const warningsHtml = (a.warnings || []).length
            ? `<div class="reasons warnings"><h4>Uyarılar</h4><ul>${
                a.warnings.map(w => `<li>${escapeHtml(w)}</li>`).join('')
              }</ul></div>`
            : '';

        const statsTable = renderStatsTable(ev, a);
        const playerHtml = renderPlayerNotes(a.player_notes);

        const confidence = Math.max(0, Math.min(100, a.confidence_score || 0));

        $('detail-body').innerHTML = `
            <div class="score-row">
                <div class="teams-big">
                    <div><strong>${escapeHtml(ev.home?.name || '')}</strong> vs <strong>${escapeHtml(ev.away?.name || '')}</strong></div>
                    <div class="tournament">${escapeHtml(ev.tournament || '')} · ${escapeHtml(ev.status_description || '')}</div>
                    <div class="tournament">${periods}</div>
                </div>
                <div class="big">${hs} - ${as}</div>
            </div>

            <div class="decision-banner">
                <div class="side ${sideClass(a.recommendation_side)}">
                    Karar: ${escapeHtml(a.recommendation_side || '—')}
                </div>
                <div class="confidence-bar"><span style="width: ${confidence}%"></span></div>
                <div class="confidence-label">Güven: ${confidence}/100 (${escapeHtml(a.confidence_label || '')})${a.z_score != null ? ` · z=${a.z_score}` : ''}</div>
            </div>

            ${keyMetricsHtml}

            <div class="line-input">
                <label for="live-line">Canlı barem:</label>
                <input id="live-line" type="number" step="0.5" placeholder="ör. 168.5"
                       value="${state.liveLine ?? ''}" />
                <button id="apply-line">Uygula</button>
                <span class="value-hint">AiScore'daki ÜST/ALT barem çizgisi</span>
            </div>

            <div class="reasons">
                <h4>Ana nedenler</h4>
                ${reasonsHtml}
            </div>
            ${warningsHtml}

            <h3 class="section-title">Özet kartlar</h3>
            <div class="cards-grid">
                <div class="mini-card">
                    <div class="h">Süre</div>
                    <div class="v">${elapsed} / ${a.total_minutes ?? '—'} dk</div>
                    <div class="sub">Kalan: ${remaining} dk${a.in_overtime ? ' (uzatma)' : ''}</div>
                </div>
                <div class="mini-card">
                    <div class="h">Şut kalitesi</div>
                    <div class="v">${escapeHtml(a.shot_quality_label || '—')}</div>
                </div>
                ${advHtml}
                <div class="mini-card">
                    <div class="h">Faul / FT baskısı</div>
                    <div class="v">${escapeHtml(a.foul_pressure_label || '—')}</div>
                </div>
                <div class="mini-card">
                    <div class="h">Top kaybı</div>
                    <div class="v">${escapeHtml(a.turnover_label || '—')}</div>
                </div>
                <div class="mini-card">
                    <div class="h">Ribaund</div>
                    <div class="v">${escapeHtml(a.rebound_label || '—')}</div>
                </div>
                <div class="mini-card">
                    <div class="h">Maç scripti</div>
                    <div class="v" style="font-size: 13px;">${escapeHtml(a.script_label || '—')}</div>
                </div>
                ${vlHtml}
            </div>

            ${statsTable}
            ${playerHtml}
        `;

        $('apply-line').addEventListener('click', () => {
            const raw = $('live-line').value.trim();
            state.liveLine = raw ? parseFloat(raw.replace(',', '.')) : null;
            selectEvent(state.selectedId, true);
        });
        $('live-line').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') $('apply-line').click();
        });

        const copyBtn = $('copy-json-btn');
        copyBtn.style.display = 'inline-block';
        copyBtn.onclick = async () => {
            if (!state.lastAnalysis) return;
            const payload = buildGeminiJson(state.lastAnalysis);
            const text = JSON.stringify(payload, null, 2);
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.textContent = '✓ Kopyalandı';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '⎘ JSON Kopyala';
                    copyBtn.classList.remove('copied');
                }, 2000);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                copyBtn.textContent = '✓ Kopyalandı';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '⎘ JSON Kopyala';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }
        };
    }

    function renderStatsTable(ev, a) {
        const s = a.stats || {};
        if (!Object.keys(s).length) {
            return '<h3 class="section-title">İstatistikler</h3><div class="empty">Veri yok.</div>';
        }

        function row(label, key, fmt) {
            const row = s[key];
            if (!row) return '';
            const h = fmt ? fmt(row.home) : (row.home ?? '-');
            const a = fmt ? fmt(row.away) : (row.away ?? '-');
            return `<tr><td class="label">${escapeHtml(label)}</td><td>${h}</td><td>${a}</td></tr>`;
        }

        function rowMA(label, madeKey, attKey) {
            const m = s[madeKey], at = s[attKey];
            if (!m || !at) return '';
            const fmt = (mv, av) => {
                if (mv == null || av == null) return '-';
                const pct = av > 0 ? Math.round((mv / av) * 100) : 0;
                return `${mv}/${av} (${pct}%)`;
            };
            return `<tr>
                <td class="label">${escapeHtml(label)}</td>
                <td>${fmt(m.home, at.home)}</td>
                <td>${fmt(m.away, at.away)}</td>
            </tr>`;
        }

        return `
            <h3 class="section-title">İstatistikler</h3>
            <div style="padding: 0 16px 16px;">
            <table class="stat-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>${escapeHtml(ev.home?.short || ev.home?.name || 'Ev')}</th>
                        <th>${escapeHtml(ev.away?.short || ev.away?.name || 'Dep')}</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="section-h"><td colspan="3">Şut</td></tr>
                    ${rowMA('Saha içi', 'fg_made', 'fg_att')}
                    ${rowMA('2 sayı', 'two_made', 'two_att')}
                    ${rowMA('3 sayı', 'three_made', 'three_att')}
                    ${rowMA('Serbest atış', 'ft_made', 'ft_att')}

                    <tr class="section-h"><td colspan="3">Ribaund</td></tr>
                    ${row('Toplam', 'rebounds_total')}
                    ${row('Hücum', 'offensive_rebounds')}
                    ${row('Savunma', 'defensive_rebounds')}

                    <tr class="section-h"><td colspan="3">Diğer</td></tr>
                    ${row('Asist', 'assists')}
                    ${row('Top kaybı', 'turnovers')}
                    ${row('Top çalma', 'steals')}
                    ${row('Blok', 'blocks')}
                    ${row('Faul', 'fouls')}
                    ${row('En büyük fark', 'biggest_lead')}
                    ${row('En büyük seri', 'biggest_run')}
                </tbody>
            </table>
            </div>
        `;
    }

    function renderPlayerNotes(notes) {
        if (!notes || !notes.length) return '';
        const parts = notes.map(n => {
            if (n.type === 'foul_trouble') {
                return `<div class="note danger">⚠ Faul problemi: <strong>${escapeHtml(n.name)}</strong> (${n.fouls} faul)</div>`;
            }
            if (n.type === 'single_carry') {
                return `<div class="note">⚡ Skor yükünü tek oyuncu taşıyor: <strong>${escapeHtml(n.name)}</strong> (${n.points} sayı, %${Math.round(n.share*100)})</div>`;
            }
            return '';
        }).join('');
        return `<h3 class="section-title">Oyuncu notları</h3><div class="player-notes">${parts}</div>`;
    }

    // ----- olay dinleyiciler -----
    $('refresh-btn').addEventListener('click', () => {
        loadLive();
        if (state.selectedId) selectEvent(state.selectedId);
    });
    $('filter-team').addEventListener('input', (e) => {
        state.filterTeam = e.target.value;
        renderList();
    });
    $('filter-league').addEventListener('input', (e) => {
        state.filterLeague = e.target.value;
        renderList();
    });
    $('back-btn').addEventListener('click', () => {
        $('detail-panel').classList.add('hidden-mobile');
        $('back-btn').classList.remove('visible');
    });
    $('auto-refresh').addEventListener('change', (e) => {
        if (state.autoRefreshTimer) {
            clearInterval(state.autoRefreshTimer);
            state.autoRefreshTimer = null;
        }
        if (e.target.checked) {
            state.autoRefreshTimer = setInterval(() => {
                loadLive();
                if (state.selectedId) selectEvent(state.selectedId);
            }, 30000);
        }
    });

    // ilk yükleme
    loadLive();
    </script>
</body>
</html>
